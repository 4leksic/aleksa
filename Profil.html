<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profil</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
      .bg-image {
        background: url('pozadina.jpg') no-repeat center center;
        background-size: cover;
        height: 100vh;
        position: relative;
      }

      .bg-image::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.55);
      }

      .profile-card {
        position: relative;
        z-index: 2;
        width: 650px;
        border-radius: 20px;
        backdrop-filter: blur(12px);
        background: rgba(20, 20, 20, 0.75);
        border: 1px solid rgba(255, 0, 0, 0.4);
        box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        transition: 0.3s ease;
      }

      .profile-card:hover {
        transform: translateY(-5px);
      }

      .stat-box {
        padding: 10px;
        border-radius: 12px;
        background: rgba(255,255,255,0.05);
        transition: 0.2s ease;
      }

      .stat-box:hover {
        background: rgba(255,0,0,0.15);
        transform: scale(1.05);
      }

      .avatar {
        border: 3px solid #dc3545;
        box-shadow: 0 0 20px rgba(220,53,69,0.4);
      }
    </style>
  </head>

  <body class="bg-dark text-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
      <div class="container-fluid">

        <a class="navbar-brand d-flex align-items-center" href="index.html">
          <img src="Slika.png" alt="Logo" width="100" height="40" class="me-2">
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link active" href="Profil.html">Profil</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="mecevi.html">Mečevi</a>
            </li>
          </ul>

          <form class="d-flex">
            <input class="form-control me-2" type="search" placeholder="Nađi prijatelja">
            <button class="btn btn-dark" type="submit">Search</button>
          </form>
        </div>

      </div>
    </nav>

    <div class="bg-image d-flex align-items-center justify-content-center">

      <div class="card profile-card text-light">

        <div class="card-body text-center p-5">

          <img src="profilna.png"
               class="rounded-circle mb-3 avatar"
               width="160" height="160">

          <h2 class="mb-1 fw-bold">Mmusli</h2>
          <small class="text-danger">FACEIT PROFILE</small>

          <hr class="border-danger my-4">

          <div class="row text-center g-3">

            <div class="col-6">
              <div class="stat-box">
                <div class="fw-bold">ELO</div>
                <div class="fs-3 text-danger">711</div>
              </div>
            </div>

            <div class="col-6">
              <div class="stat-box">
                <div class="fw-bold">Matches</div>
                <div class="fs-3">30</div>
              </div>
            </div>

            <div class="col-6">
              <div class="stat-box">
                <div class="fw-bold">Win %</div>
                <div class="fs-3 text-success">67%</div>
              </div>
            </div>

            <div class="col-6">
              <div class="stat-box">
                <div class="fw-bold">HS %</div>
                <div class="fs-3 text-warning">67%</div>
              </div>
            </div>

            <div class="col-12 mt-2">
              <div class="stat-box">
                <div class="fw-bold">K/D/A Avg</div>
                <div class="fs-4 text-info">12 / 16 / 5</div>
              </div>
            </div>

          </div>

        </div>
      </div>

    </div>

  </body>
</html>
